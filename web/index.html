<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#F1FAF6" />
    <title>Dieta</title>
    <script>
      /* iOS Safari: forza scala iniziale = 1 anche dopo il FOUT. Mentre i webfont
       * (Google Fonts) caricano, Safari può fissare una scala errata → apertura
       * "zoomata". Quando i font sono pronti ri-asseriamo il meta viewport. Non
       * impostiamo mai maximum-scale/user-scalable=no (pinch-zoom resta attivo). */
      (function () {
        var BASE = 'width=device-width, initial-scale=1.0, viewport-fit=cover';
        var vp = document.querySelector('meta[name="viewport"]');
        if (!vp) return;
        function reassert() {
          vp.setAttribute('content', BASE + ', minimum-scale=1');
          requestAnimationFrame(function () {
            vp.setAttribute('content', BASE);
          });
        }
        if (document.fonts && document.fonts.ready) document.fonts.ready.then(reassert);
        window.addEventListener('load', reassert);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&family=Varela+Round&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
