<!doctype html>
<html lang="it"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Spesa mobile · A</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet"/>
<style>
 body{font-family:'Nunito Sans',sans-serif;background:#e7ecea;margin:0;padding:24px 0}
 .round{font-family:'Varela Round',sans-serif}
 .phone{width:390px;margin:0 auto;background:#F1FAF6;border-radius:38px;box-shadow:0 30px 70px -20px rgba(0,0,0,.4);overflow:hidden;border:10px solid #11181f}
 .scroll{height:760px;overflow-y:auto}
 .scroll::-webkit-scrollbar{display:none}
 .grn{color:#059669}.nic{color:#3B82F6}.noemi{color:#E879A0}
 .card{background:#fff;border-radius:18px;box-shadow:0 1px 2px rgba(60,80,70,.04),0 8px 22px -14px rgba(60,80,70,.16)}
 .chk{width:26px;height:26px;border-radius:50%;border:2px solid #D7DCE2;flex:none;position:relative;background:#fff}
 .chk.on{background:#059669;border-color:#059669}
 .chk.on::after{content:'';position:absolute;left:8px;top:4px;width:6px;height:11px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg)}
 .dot{width:18px;height:18px;border-radius:50%;font-size:8px;font-weight:900;display:grid;place-items:center;border:1.5px solid}
 .pill{font-size:12px;font-weight:800;padding:7px 13px;border-radius:999px;white-space:nowrap;flex:none}
</style></head>
<body>
<div class="phone"><div class="scroll">
  <!-- header compatto -->
  <div class="sticky top-0 z-20 px-4 pt-4 pb-2" style="background:rgba(241,250,246,.95);backdrop-filter:blur(8px)">
    <div class="flex items-end justify-between">
      <h1 class="round text-[30px] leading-none">Spesa</h1>
      <span class="text-[13px] font-extrabold text-[#9CA3AF]"><b class="grn text-[15px]">12</b> da prendere · 5 presi</span>
    </div>
    <div class="mt-2 h-2 rounded-full bg-[#E2E8E5] overflow-hidden"><div class="h-full rounded-full" style="width:30%;background:linear-gradient(90deg,#16A34A,#4ADE80)"></div></div>
    <!-- aggiunta rapida -->
    <div class="card mt-3 flex items-center gap-2 px-3 py-2">
      <span class="text-[#C5CAD2] text-xl leading-none">＋</span>
      <input class="flex-1 bg-transparent outline-none text-[15px] py-1.5" placeholder="Aggiungi un articolo…"/>
      <button class="pill bg-[#F4F6F8] text-[#6B7280]">🥦 Verdure ▾</button>
    </div>
    <!-- filtri: una riga scrollabile (viste + persone) -->
    <div class="mt-2 flex gap-2 overflow-x-auto pb-1" style="scrollbar-width:none">
      <button class="pill bg-[#DCFCE7] text-[#15803D]">🛒 Da comprare</button>
      <button class="pill bg-white text-[#9CA3AF] shadow-sm">🏠 Dispensa</button>
      <button class="pill bg-white text-[#9CA3AF] shadow-sm">🔵 Nicholas</button>
      <button class="pill bg-white text-[#9CA3AF] shadow-sm">🩷 Noemi</button>
      <button class="pill bg-white text-[#9CA3AF] shadow-sm">🐈 Mia</button>
    </div>
  </div>

  <div class="px-4 pb-28 space-y-3">
    <!-- categoria card -->
    <div class="card overflow-hidden">
      <div class="flex items-center gap-2.5 px-4 pt-3.5 pb-1.5">
        <span class="grid h-8 w-8 place-items-center rounded-xl bg-[#ECFDF5] text-base">🥦</span>
        <span class="round text-[15px] text-[#374151]">Verdure</span>
        <span class="ml-auto text-[11px] font-extrabold grn bg-[#E9F9EE] rounded-full px-2.5 py-0.5">3</span>
      </div>
      <!-- riga: check grande, nome grande, azioni SEMPRE visibili a destra -->
      <div class="flex items-center gap-3 px-4 py-3 border-t border-[#F4F5F7]">
        <span class="chk"></span>
        <span class="flex-1 text-[16px]">Zucchine</span>
        <span class="flex gap-1"><span class="dot" style="background:#EFF6FF;color:#3B82F6;border-color:#3B82F6">N</span></span>
        <button class="text-[#C7CDD4] text-[15px] px-1">🏠</button>
        <button class="text-[#D7B8BC] text-[15px] px-1">✕</button>
      </div>
      <div class="flex items-center gap-3 px-4 py-3 border-t border-[#F4F5F7]">
        <span class="chk on"></span>
        <span class="flex-1 text-[16px] line-through text-[#C5CAD2]">Pomodori</span>
        <button class="text-[#C7CDD4] text-[15px] px-1">🏠</button>
        <button class="text-[#D7B8BC] text-[15px] px-1">✕</button>
      </div>
      <div class="flex items-center gap-3 px-4 py-3 border-t border-[#F4F5F7]">
        <span class="chk"></span>
        <span class="flex-1 text-[16px]">Insalata</span>
        <button class="text-[#C7CDD4] text-[15px] px-1">🏠</button>
        <button class="text-[#D7B8BC] text-[15px] px-1">✕</button>
      </div>
    </div>

    <div class="card overflow-hidden">
      <div class="flex items-center gap-2.5 px-4 pt-3.5 pb-1.5">
        <span class="grid h-8 w-8 place-items-center rounded-xl bg-[#FEF2F4] text-base">🥩</span>
        <span class="round text-[15px] text-[#374151]">Macelleria</span>
        <span class="ml-auto text-[11px] font-extrabold grn bg-[#E9F9EE] rounded-full px-2.5 py-0.5">1</span>
      </div>
      <div class="flex items-center gap-3 px-4 py-3 border-t border-[#F4F5F7]">
        <span class="chk"></span>
        <span class="flex-1 text-[16px]">Petto di pollo</span>
        <span class="flex gap-1"><span class="dot" style="background:#FCE7F3;color:#E879A0;border-color:#E879A0">N</span></span>
        <button class="text-[#C7CDD4] text-[15px] px-1">🏠</button>
        <button class="text-[#D7B8BC] text-[15px] px-1">✕</button>
      </div>
    </div>

    <!-- categorie vuote collassate -->
    <button class="w-full text-center text-[13px] font-bold text-[#9CA3AF] py-2">▾ mostra 8 categorie vuote</button>
  </div>
</div></div>

<!-- barra azioni fissa in basso (dentro al telefono) -->
<div style="width:390px;margin:-86px auto 0;position:relative;z-index:30" class="px-4">
  <div class="flex gap-2">
    <button class="flex-1 round text-[16px] text-white rounded-full py-3.5 shadow-lg" style="background:linear-gradient(135deg,#059669,#34D399)">✓ Spesa fatta</button>
    <button class="grid place-items-center h-[52px] w-[52px] rounded-full bg-white text-[#6B7280] text-lg shadow-lg">⋯</button>
  </div>
</div>
<p class="text-center text-[12px] text-[#5b6b64] mt-4">Variante A · "Compatta + azioni sempre visibili"</p>
</body></html>
