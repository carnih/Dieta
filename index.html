<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dieta">
  <meta name="theme-color" content="#F1F5F9">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%BD%EF%B8%8F%3C/text%3E%3C/svg%3E">
  <title>Dieta</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&family=Rubik:wght@500;600;700;800;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --n:#3B82F6;--n-l:#EFF6FF;--n-g:linear-gradient(135deg,#2563EB,#60A5FA);
      --e:#E879A0;--e-l:#FDF2F8;--e-g:linear-gradient(135deg,#DB2777,#F472B6);
      --bg:#F1FAF6;--card:#fff;--text:#111827;--muted:#8B97A6;--border:#E6EFEA;--r:18px;
      --grn:#059669;
      /* scala neutra coerente */
      --n50:#F8FAFC;--n100:#F1F5F9;--n200:#E7EBF0;--n300:#D5DBE3;--n400:#9CA3AF;--n600:#4B5563;--n800:#1F2937;
      /* tipografia */
      --font-head:'Rubik',-apple-system,'Segoe UI',sans-serif;
      --font-body:'Nunito Sans',-apple-system,'Segoe UI',sans-serif;
      /* ombre coerenti */
      --sh-1:0 1px 3px rgba(15,23,42,.06);
      --sh-2:0 4px 16px rgba(15,23,42,.08);
      --sh-pop:0 12px 32px rgba(15,23,42,.16);
      --ease:cubic-bezier(.4,0,.2,1);
    }
    body{
      font-family:var(--font-body);
      background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;
      padding-bottom:calc(72px + env(safe-area-inset-bottom,0px));
      overflow-x:hidden;-webkit-text-size-adjust:100%;text-size-adjust:100%;
      -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    }
    /* titoli con Rubik */
    .page-title,.day-name,.cmp-card .cmp-head,.catman-title,.shop-empty,.edit-title,.cat-editor-title{font-family:var(--font-head)}
    /* feedback tattile globale + focus accessibili */
    button{font-family:inherit}
    button:active{transition:transform .08s var(--ease)}
    :focus-visible{outline:2.5px solid var(--n);outline-offset:2px;border-radius:8px}
    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
    }
    /* micro-interazioni coerenti (press feedback) */
    .shop-row{transition:background .15s var(--ease)}
    .shop-row:active{background:var(--n50)}
    .shop-filter{transition:all .15s var(--ease)}
    .shop-filter:active{transform:scale(.96)}
    .cal-day:active .cal-dt,.chip:active{transform:scale(.94)}
    .owner-badge{transition:transform .12s var(--ease),opacity .15s,filter .15s}
    .owner-badge:active{transform:scale(.88)}

    /* ── NAVIGAZIONE ──
       MOBILE (default): barra in basso.  DESKTOP (≥760px): rail laterale. */
    #rail{
      position:fixed;left:0;right:0;bottom:0;z-index:41;
      display:flex;flex-direction:row;gap:2px;
      background:rgba(255,255,255,.94);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
      border-top:1px solid rgba(0,0,0,.07);
      padding:6px 6px calc(6px + env(safe-area-inset-bottom,0px));
    }
    .rail-exp{display:none}
    #rail button[data-tab]{
      flex:1;border:none;background:transparent;cursor:pointer;color:#A3ABB6;
      display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;border-radius:14px;
      font-weight:700;font-size:11px;letter-spacing:-.1px;transition:color .15s;
    }
    #rail button[data-tab] .ic{font-size:22px;line-height:1;filter:grayscale(.35);opacity:.75;transition:all .15s}
    #rail button.act{color:#1F2937}
    #rail button.act .ic{filter:none;opacity:1}
    #rail button.act[data-tab="nicholas"]{color:var(--n)}
    #rail button.act[data-tab="noemi"]{color:var(--e)}
    #rail button.act[data-tab="spesa"]{color:var(--grn)}
    #scrim{display:none}

    @media (min-width:760px){
      #rail{
        right:auto;top:0;bottom:0;width:62px;flex-direction:column;gap:5px;overflow:hidden;
        background:#fff;border-top:none;border-right:1px solid rgba(0,0,0,.07);
        padding:calc(12px + env(safe-area-inset-top,0px)) 9px 12px;
        transition:width .22s cubic-bezier(.4,0,.2,1);
      }
      #rail.exp{width:206px;box-shadow:8px 0 30px rgba(0,0,0,.14)}
      .rail-exp{display:flex;flex-shrink:0;border:none;background:transparent;color:#9CA3AF;font-size:19px;height:42px;width:44px;border-radius:13px;cursor:pointer;align-items:center;justify-content:center}
      .rail-exp:active{background:#F1F5F9}
      #rail button[data-tab]{
        flex:none;flex-direction:row;align-items:center;gap:13px;height:50px;padding:0 10px;
        font-size:15px;letter-spacing:-.2px;color:#9CA3AF;white-space:nowrap;transition:background .15s,color .15s;
      }
      #rail button[data-tab] .ic{font-size:23px;width:24px;text-align:center;filter:grayscale(.3);opacity:1}
      #rail button[data-tab] .lbl{opacity:0;transition:opacity .18s}
      #rail.exp button[data-tab] .lbl{opacity:1}
      #rail button.act{background:#F1F5F9;color:#1F2937}
      #rail button.act[data-tab="nicholas"]{background:var(--n-l);color:var(--n)}
      #rail button.act[data-tab="noemi"]{background:var(--e-l);color:var(--e)}
      #rail button.act[data-tab="spesa"]{background:#E9F9EE;color:var(--grn)}
      #scrim{display:block;position:fixed;inset:0;z-index:40;background:rgba(15,23,42,.28);opacity:0;pointer-events:none;transition:opacity .2s}
      body.nav-open #scrim{opacity:1;pointer-events:auto}
    }

    /* ── PAGE TITLES ── */
    .page-title{font-size:28px;font-weight:850;letter-spacing:-.6px;padding:8px 2px 0;color:#111827}
    .page-title.n{background:var(--n-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .page-title.e{background:var(--e-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .page-sub{font-size:14px;color:#9CA3AF;font-weight:600;padding:2px 2px 6px}
    .sec-title{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;padding:8px 2px 2px}
    .sec-title.n{color:var(--n)}
    .sec-title.e{color:var(--e)}

    /* ── MINI CALENDARIO (stile iOS) ── */
    .cal{display:flex;gap:3px;padding:4px 0 2px}
    .cal-day{flex:1 1 0;min-width:0;border:none;background:transparent;padding:4px 0;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
    .cal-wd{font-size:11px;font-weight:600;color:#B6BCC6;letter-spacing:.01em}
    .cal-dt{
      font-size:16px;font-weight:700;color:#374151;
      width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;
      transition:all .18s;
    }
    .cal-day.today .cal-dt{color:var(--e)}
    .cal-day.today .cal-wd{color:var(--e)}
    .cal-day.sel .cal-dt{background:var(--e-g);color:#fff;font-weight:800;box-shadow:0 5px 14px rgba(219,39,119,.4)}
    .cal-day.sel .cal-wd{color:var(--e);font-weight:800}

    /* ── OGGI: header colonne (una volta) ── */
    .cmp-top{
      position:sticky;top:env(safe-area-inset-top,0px);z-index:10;display:grid;grid-template-columns:1fr 1fr;
      background:var(--bg);padding:6px 2px 8px;margin-bottom:-2px;gap:6px;
    }
    .cmp-top-col{
      font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;
      display:flex;flex-direction:row;align-items:center;gap:6px;flex-wrap:wrap;
      padding:7px 10px;border-radius:10px;
    }
    .cmp-top-col.e{color:var(--e);background:#FCE7F3;border-bottom:2px solid var(--e)}
    .cmp-top-col.n{color:var(--n);background:var(--n-l);border-bottom:2px solid var(--n)}
    .train-tag{display:inline-block;width:fit-content;font-size:10px;font-weight:800;background:rgba(255,255,255,.7);color:var(--n);padding:2px 8px;border-radius:20px;text-transform:none;letter-spacing:0;border:1px solid rgba(59,130,246,.25)}

    /* ── OGGI: card di confronto a 2 colonne ── */
    .cmp-card{background:#fff;border-radius:16px;box-shadow:var(--sh-1);overflow:hidden}
    .cmp-head{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:12.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:#9CA3AF}
    .cmp-head .em{font-size:15px}
    .cmp-cols{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr)}
    .cmp-col{padding:11px 10px;min-width:0;overflow:hidden}
    .cmp-col + .cmp-col{border-left:1px solid var(--border)}
    .cmp-items{display:flex;flex-direction:column;gap:9px}

    /* ── PIANIFICATORE SETTIMANA (Nicholas) ── */
    .sched{display:flex;flex-direction:column;gap:7px;background:#fff;border-radius:16px;padding:11px 12px;box-shadow:var(--sh-1)}
    .sched-row{display:flex;align-items:center;gap:10px}
    .sched-day{width:38px;font-size:13px;font-weight:800;color:#374151;flex-shrink:0}
    .sched-selwrap{flex:1;position:relative;min-width:0}
    .sched-sel{width:100%;appearance:none;-webkit-appearance:none;font-family:inherit;font-size:13.5px;font-weight:600;color:#1F2937;padding:9px 30px 9px 12px;border:1.5px solid #E5E7EB;border-radius:10px;background:#FAFAFA;outline:none}
    .sched-sel:focus{border-color:var(--n)}
    .sched-selwrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#9CA3AF;font-size:11px;pointer-events:none}

    /* ── PIANIFICATORE NOEMI ── */
    .pl-meal{padding:11px 0;border-bottom:1px solid var(--border)}
    .pl-meal:last-child{border-bottom:none}
    .pl-slot{display:flex;flex-direction:column;gap:5px;margin-bottom:9px}
    .pl-fixed{font-size:12px;color:#9CA3AF;padding:1px 0 3px 2px}
    .pl-notes{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:var(--sh-1);display:flex;flex-direction:column;gap:7px}
    .pl-note{font-size:12.5px;color:#4B5563;line-height:1.45}
    .pl-ref{font-size:12px;color:#6B7280;line-height:1.5}
    .pl-ref b{color:#374151}
    .pl-recipe{width:100%;margin-bottom:8px;font-family:inherit;font-size:13px;padding:9px 11px;border:1.5px dashed #E5C5D5;border-radius:10px;background:#FFF9FC;color:#374151;outline:none}
    .pl-recipe:focus{border-style:solid;border-color:var(--e);background:#fff}
    .pl-recipe::placeholder{color:#C9A6BA}
    .pl-recipe.has{border-style:solid;border-color:var(--e);background:#FFF1F7;font-weight:700;color:#9D2D63}
    .pl-choices.dim{opacity:.45;transition:opacity .15s}
    .pl-choices.dim:focus-within{opacity:1}
    .pl-altlbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#C9A6BA;margin:2px 0 6px}
    .recipe-note{margin-top:2px;font-size:12px;color:#9D5577;background:#FDF2F8;border-radius:8px;padding:6px 9px;line-height:1.4;font-style:italic}

    /* ── EDITOR DIETA BASE ── */
    .be-open{display:inline-flex;align-items:center;gap:5px;border:1.5px solid #F0D9E4;background:#FDF2F8;color:var(--e);font-size:12.5px;font-weight:700;cursor:pointer;padding:6px 14px;border-radius:50px;margin-bottom:4px}
    .be-open:active{background:#F5E2EE}
    .be-done{border:1.5px solid #E5E7EB;background:#fff;border-radius:50px;padding:8px 18px;font-size:13px;font-weight:700;color:#374151;cursor:pointer;margin-bottom:4px;align-self:flex-start}
    .be-done:active{background:#F3F4F6}
    .be-slot{margin-bottom:13px}
    .be-slot-h{font-size:11px;font-weight:800;color:#9CA3AF;text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px;display:flex;align-items:center;gap:7px}
    .be-opt{display:flex;gap:6px;align-items:center;margin-bottom:5px}
    .be-in{flex:1;min-width:0;font-family:inherit;font-size:13px;padding:8px 10px;border:1.5px solid #E5E7EB;border-radius:9px;background:#fff;outline:none}
    .be-in:focus{border-color:var(--n)}

    /* ── PASTO LIBERO ── */
    .meal-free{margin-left:auto;border:1.5px solid #F0D9E4;background:#fff;color:var(--e);border-radius:50px;padding:4px 11px;font-size:11px;font-weight:800;cursor:pointer}
    .meal-free.on{background:var(--e-g);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(219,39,119,.3)}
    .pl-free{font-size:13.5px;font-weight:700;color:var(--e);background:#FDF2F8;border-radius:10px;padding:10px 13px}
    .free-chip{display:inline-block;background:#FDF2F8;color:var(--e);font-size:12.5px;font-weight:800;padding:5px 12px;border-radius:20px}

    /* ── RESET ── */
    .reset-row{display:flex;gap:8px;flex-wrap:wrap;margin:2px 0 2px}
    .reset-btn{border:1.5px solid #EBE3E7;background:#fff;color:#B6BCC6;font-size:12px;font-weight:700;padding:6px 13px;border-radius:50px;cursor:pointer}
    .reset-btn:active{background:#F8F4F6;color:#9D5577}

    /* ── SPESA ── */
    /* check circolare (riutilizzabile) */
    .sp-circle{
      flex-shrink:0;width:25px;height:25px;border-radius:50%;
      border:2px solid #D7DCE2;background:#fff;cursor:pointer;position:relative;
      transition:all .15s;padding:0;
    }
    .sp-circle.on{background:var(--grn);border-color:var(--grn)}
    .sp-circle.on::after{content:'';position:absolute;left:7px;top:3.5px;width:6px;height:11px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg)}
    .sp-circle.big{width:30px;height:30px}
    .sp-circle.big.on::after{left:9px;top:5px;width:7px;height:13px}

    /* toolbar */
    .shop-prog{margin-bottom:10px}
    .shop-prog-txt{font-size:12.5px;font-weight:700;color:#9CA3AF;margin-bottom:5px}
    .shop-prog-track{height:6px;background:#E7EAEF;border-radius:50px;overflow:hidden}
    .shop-prog-fill{height:100%;background:linear-gradient(90deg,#16A34A,#4ADE80);border-radius:50px;transition:width .3s}
    .shop-actions{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .shop-tool{flex-shrink:0;border:none;background:#fff;color:#6B7280;font-size:14px;font-weight:700;padding:10px 14px;border-radius:50px;cursor:pointer;box-shadow:var(--sh-1)}
    .shop-tool.gen{background:linear-gradient(135deg,#059669,#34D399);color:#fff;box-shadow:0 6px 16px rgba(5,150,105,.3)}
    .shop-tool.sec{background:#FFF7ED;color:#B45309;border:1.5px solid #FED7AA;box-shadow:none}
    .shop-tool.sec:active{background:#FFEDD5}
    .shop-tool.icon{width:42px;height:42px;padding:0;display:flex;align-items:center;justify-content:center;font-size:16px}
    .shop-tool.danger{color:#EF4444;border:1.5px solid #FEE2E2;background:#fff;box-shadow:none}
    .shop-tool.danger:active{background:#FFF5F5}
    .shop-tool:active{transform:scale(.95)}

    /* filtri */
    .shop-filters{display:flex;gap:7px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
    .shop-filters::-webkit-scrollbar{display:none}
    .shop-filter{flex-shrink:0;border:1.5px solid #E2E8F0;background:#fff;color:#9CA3AF;font-size:13px;font-weight:700;padding:7px 14px;border-radius:50px;cursor:pointer;transition:all .15s}
    .shop-filter.on{border-color:transparent}
    .shop-filter.on.f-pantry{background:#FEF3C7;color:#92400E}
    .shop-filter.on.f-nicholas{background:var(--n-l);color:var(--n)}
    .shop-filter.on.f-noemi{background:#FCE7F3;color:var(--e)}
    .shop-filter.on.f-gatto{background:#FEF3C7;color:#92400E}
    .shop-filter.on.f-coniglio{background:#E0E7FF;color:#4338CA}
    .shop-filter.on.f-tobuy{background:#DCFCE7;color:#15803D}

    /* toggle dispensa 🏠 su voce */
    .shop-pantry-btn{flex-shrink:0;border:none;background:transparent;font-size:15px;cursor:pointer;padding:3px 5px;border-radius:8px;opacity:.35;filter:grayscale(1);transition:all .15s}
    .shop-row:hover .shop-pantry-btn{opacity:.7}
    .shop-pantry-btn:active{transform:scale(.85)}
    .shop-pantry-btn.on{opacity:1;filter:none;background:#FDE68A;border:1.5px solid #F59E0B;padding:4px 7px}
    .shop-row.pantry-row .shop-name{font-style:italic;color:#9CA3AF;font-size:14px}
    .shop-row.pantry-row{background:#FFFDF5}
    /* cerchio "in dispensa": flaggato grigio, non cliccabile */
    .pantry-check{flex-shrink:0;width:25px;height:25px;border-radius:50%;border:2px solid #D1D5DB;background:#D1D5DB;position:relative;cursor:default}
    .pantry-check::after{content:'';position:absolute;left:7px;top:3.5px;width:6px;height:11px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg)}

    /* lista (stile Listonic): un'unica superficie, sezioni leggere */
    .shop{background:#fff;border-radius:var(--r);box-shadow:var(--sh-1);overflow:hidden;padding:4px 0}
    .shop-sec{padding:0}
    .shop-sec-h{display:flex;align-items:center;gap:11px;padding:14px 16px 7px}
    .shop-sec-name{font-size:11.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#AEB4BE}
    .shop-sec-n{margin-left:auto;font-size:11px;font-weight:800;color:var(--grn);background:#E9F9EE;border-radius:20px;padding:2px 9px}
    .shop-row{display:flex;align-items:center;gap:13px;padding:11px 16px;border-top:1px solid #F4F5F7}
    .shop-name{flex:1;font-size:15.5px;color:#1F2937;line-height:1.3;outline:none;border-radius:6px;padding:2px 4px;margin:-2px -4px}
    .shop-name:focus{background:#F1F5F9;box-shadow:inset 0 0 0 1.5px #CBD5E1}
    .shop-row.done .shop-name{text-decoration:line-through;color:#C5CAD2}
    .shop-x{flex-shrink:0;border:none;background:transparent;color:#DDE1E6;font-size:14px;cursor:pointer;padding:4px;opacity:0;transition:opacity .15s}
    .shop-row:hover .shop-x,.shop-row.done .shop-x{opacity:1}
    .shop-addrow{display:flex;align-items:center;gap:11px;padding:8px 16px 12px}
    .shop-plus{width:25px;text-align:center;color:#C5CAD2;font-size:20px;font-weight:300;flex-shrink:0}
    .shop-in{flex:1;min-width:0;border:none;outline:none;font-family:inherit;font-size:14.5px;color:#374151;background:transparent;padding:4px 0}
    .shop-in::placeholder{color:#C5CAD2}
    .shop-empty{text-align:center;color:#AEB4BE;padding:38px 16px;font-size:18px;font-weight:700}
    .shop-empty div{margin-top:8px}
    .shop-empty span{display:block;font-size:13px;font-weight:500;color:#C5CAD2;margin-top:4px}
    .sp-circle.sm{width:21px;height:21px;border-width:2px}
    .sp-circle.sm.on::after{left:5.5px;top:2.5px;width:5px;height:9px}

    /* ── OWNER BADGES ── */
    .owner-badges{display:flex;gap:3px;flex-shrink:0;align-items:center;margin-left:6px}
    .owner-badge{width:20px;height:20px;border-radius:50%;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;letter-spacing:0;border:1.5px solid transparent;cursor:pointer;transition:all .15s}
    .owner-badge.n{background:var(--n-l);color:var(--n);border-color:var(--n)}
    .owner-badge.e{background:#FCE7F3;color:var(--e);border-color:var(--e)}
    .owner-badge.g{background:#FEF3C7;border-color:#F59E0B;font-size:11px}
    .owner-badge.c{background:#E0E7FF;border-color:#6366F1;font-size:11px}
    .owner-badge.off{opacity:.28;border-color:#E0E0E0;filter:grayscale(.6)}
    .shop-tool:disabled{opacity:.55;cursor:not-allowed;transform:none!important}
    @keyframes spin{to{transform:rotate(360deg)}}
    .shop-tool.loading .spin{display:inline-block;animation:spin .8s linear infinite}

    /* ── EDITOR CATEGORIE ── */
    .shop-sec-edit{border:none;background:transparent;color:#9CA3AF;cursor:pointer;padding:0;font-size:12px;margin-left:auto;opacity:.6;transition:opacity .15s}
    .shop-sec-edit:hover{opacity:1}

function getSpesaCats(){
  const all = SPESA_CATS_DEFAULT.map(c=>({...c, custom:false}));
  Object.entries(spesaCategories||{}).forEach(([k,v])=>{
    if(!all.find(x=>x.key===k)) all.push({key:k, label:v.label||k, order:v.order||100, custom:true});
    else { const idx=all.findIndex(x=>x.key===k); if(idx>=0){ if(v.label) all[idx].label=v.label; if(v.order) all[idx].order=v.order; } }
  });
  // safety: categorie orfane con articoli ancora presenti (es. vecchia "proteine")
  Object.keys(spesa||{}).forEach(k=>{
    if((spesa[k]||[]).length && !all.find(x=>x.key===k))
      all.push({key:k, label:'📦 '+k, order:200, custom:true});
  });
  return all.sort((a,b)=>(a.order||100)-(b.order||100));
}

// restituisce il reparto (catKey) per un testo, o null se nessun match
function routeItem(text){
  const t = (text||'').toLowerCase();
  for(const [re,cat] of ING_MAP){ if(re.test(t)) return cat; }
  return null;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function catPill(cat){ const lbl = (catLabels && catLabels[cat]) || (CAT[cat]||CAT.altro).pill; return `<span class="cat-pill ${cat}">${esc(lbl)}</span>`; }

function foodRow(cat, text){
  return `<div class="food-row">${catPill(cat)}<span class="food-text">${esc(text)}</span></div>`;
}

function choiceBox(cat, opts, shared){
  const id = 'ch'+(_cid++);
  const word = opts.length>1 ? 'scelte' : 'scelta';
  return `<div class="choice" id="${id}">
    <div class="choice-head" onclick="toggleChoice('${id}')">
      ${catPill(cat)}
      <span class="choice-count">${opts.length} ${word}</span>
      <span class="choice-arrow">▾</span>

    <div class="choice-body"><div class="choice-inner">
      ${opts.map(o=>`<div class="choice-opt">${esc(o)}</div>`).join('')}

    </div></div>

}
window.toggleChoice = id => document.getElementById(id).classList.toggle('open');

function renderItem(it){
  if(it.alts) return choiceBox(it.cat, it.alts, it.shared||'');
  return foodRow(it.cat, it.v);
}

function renderInteg(integ){
  if(!integ) return '';
  const g = 'var(--n-g)';
  const rows = integ.multi
    ? integ.multi.map(r=>`<div class="integ-row"><span class="integ-pill">${esc(r.tag)}</span><span class="integ-val">${esc(r.v)}</span></div>`).join('')
    : `${integ.pre  ? `<div class="integ-row"><span class="integ-pill">Pre</span><span class="integ-val">${esc(integ.pre)}</span></div>`:''}
       ${integ.post ? `<div class="integ-row"><span class="integ-pill">Post</span><span class="integ-val">${esc(integ.post)}</span></div>`:''}`;
  return `<div class="integ-banner" style="background:${g}"><div class="integ-head">💊 Integrazione</div>${rows}</div>`;

//  NOEMI — piano (scelte per giorno)
// ══════════════════════════════════════════
function getDayPlan(wd){
  const saved = (noemiPlan && noemiPlan[wd]) || {};
  const dp = {};
  NOEMI_MEALS.forEach(mk=>NOEMI_BASE[mk].slots.forEach(s=>{
    dp[s.key] = (saved[s.key]!==undefined && saved[s.key]!=='') ? saved[s.key] : s.opts[0];
  }));
  return dp;
}
function noemiMealItems(wd, mealKey){
  const dp = getDayPlan(wd);
  const meal = NOEMI_BASE[mealKey];
  const items = [];
  meal.slots.forEach(s=>{ const v=dp[s.key]; if(v && v!=='— niente') items.push({cat:s.cat, v}); });
  (meal.fixed||[]).forEach(f=>items.push(f));
  return items;
}
function noteFor(wd, mealKey){ return ((noemiPlan && noemiPlan[wd]) || {})[mealKey+'_note'] || ''; }
function isMealFree(wd, mealKey){ return !!(((noemiPlan && noemiPlan[wd]) || {})[mealKey+'_free']); }
function noemiSideHTML(wd, mealKey){
  if(isMealFree(wd, mealKey)) return `<div class="free-chip">🎉 Pasto libero</div>`;
  const items = noemiMealItems(wd, mealKey);
  const choices = items.length ? items.map(it=>foodRow(it.cat, it.v)).join('') : dash();
  const note = noteFor(wd, mealKey);
  // se c'è una ricetta scritta: è il PRIMO box, le scelte sotto sbiadite (alternative)
  if(note) return `<div class="recipe-note">📝 ${esc(note)}</div><div class="pl-choices dim">${choices}</div>`;
  return choices;
}

function dash(){ return '<div class="food-text" style="color:#C9D0D9">—</div>'; }
function nicMealBy(day, kind){
  if(kind==='preall')    return day.pasti.find(p=>p.nome==='Pre-allenamento');
  if(kind==='colazione') return day.pasti.find(p=>/colazione/i.test(p.nome));
  if(kind==='spmatt')    return day.pasti.find(p=>/spuntino mattina/i.test(p.nome));
  if(kind==='pranzo')    return day.pasti.find(p=>/pranzo/i.test(p.nome));
  if(kind==='sppom')     return day.pasti.find(p=>/spuntino pomeriggio|spuntino pre/i.test(p.nome));
  if(kind==='cena')      return day.pasti.find(p=>/cena/i.test(p.nome));
  return null;
}
const SCHED_OPTS = [
  {id:'corsa',     label:'🏃 Corsa',     diet:'corsa'},
  {id:'bici',      label:'🚴 Bici',      diet:'bici'},
  {id:'palestra',  label:'🏋️ Palestra',  diet:'palestra'},
  {id:'nuoto',     label:'🏊 Nuoto',     diet:'palestra'},
  {id:'padel',     label:'🏓 Padel',     diet:'palestra'},
  {id:'combinato', label:'🔥 Combinato', diet:'combinato'},
  {id:'riposo',    label:'😴 Riposo',    diet:'riposo'},
];
function schedOpt(id){ return SCHED_OPTS.find(o=>o.id===id) || SCHED_OPTS.find(o=>o.id==='riposo'); }
function getSchedId(wd){ return (schedule && schedule[wd]) || 'riposo'; }
function getTrain(wd){ return schedOpt(getSchedId(wd)).diet; }
function trainLabel(wd){ return schedOpt(getSchedId(wd)).label; }
function integCompact(integ){
  if(!integ) return dash();
  if(integ.multi) return integ.multi.map(r=>`<div class="food-row"><span class="cat-pill integra">${esc(r.tag)}</span><span class="food-text">${esc(r.v)}</span></div>`).join('');
  let h='';
  if(integ.pre)  h+=`<div class="food-row"><span class="cat-pill integra">Pre</span><span class="food-text">${esc(integ.pre)}</span></div>`;
  if(integ.post) h+=`<div class="food-row"><span class="cat-pill integra">Post</span><span class="food-text">${esc(integ.post)}</span></div>`;
  return h || dash();
}
function weekDates(){
  const now=new Date();
  const dow=(now.getDay()+6)%7;            // 0 = lunedì
  const monday=new Date(now); monday.setDate(now.getDate()-dow);
  return NOEMI_DAYS.map((id,i)=>{ const d=new Date(monday); d.setDate(monday.getDate()+i); return {id,label:NOEMI_LABELS[id],num:d.getDate(),obj:d}; });
}
function fmtFull(d){ const s=d.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'}); return s.charAt(0).toUpperCase()+s.slice(1); }
function calendarHTML(){
  const t=todayId();
  return `<div class="cal">${weekDates().map(d=>`
    <button class="cal-day ${oggiDay===d.id?'sel':''} ${d.id===t?'today':''}" onclick="setOggiDay('${d.id}')">
      <span class="cal-wd">${d.label}</span>
      <span class="cal-dt">${d.num}</span>
    </button>`).join('')}</div>`;
}
function renderOggi(){
  const wd   = oggiDay;
  const isT  = wd===todayId();
  const nd   = NICHOLAS.days.find(d=>d.id===getTrain(wd)) || NICHOLAS.days.find(d=>d.id==='riposo');

  const rows = [{icon:'💊', title:'Integrazione', e:null, integ:nd.integ}];
  const pre = nicMealBy(nd,'preall');
  if(pre) rows.push({icon:'⚡', title:'Pre-allenamento', e:null, n:pre});
  rows.push({icon:'☀️', title:'Colazione',          e:'colazione', n:nicMealBy(nd,'colazione')});
  rows.push({icon:'🍎', title:'Spuntino mattina',    e:'spuntino',  n:nicMealBy(nd,'spmatt')});
  rows.push({icon:'🍽️', title:'Pranzo',              e:'pranzo',    n:nicMealBy(nd,'pranzo')});
  rows.push({icon:'🍊', title:'Spuntino pomeriggio', e:'merenda',   n:nicMealBy(nd,'sppom')});
  rows.push({icon:'🌙', title:'Cena',                e:'cena',      n:nicMealBy(nd,'cena')});
  if(nd.pastoLibero) rows.push({icon:'🍕', title:'Pasto libero', e:null, libero:nd.pastoLibero});

  const cards = rows.map(r=>{
    const eSide = r.e ? noemiSideHTML(wd, r.e) : dash();
    let nSide;
    if(r.integ!==undefined) nSide = integCompact(r.integ);
    else if(r.n) nSide = r.n.items.map(renderItem).join('');
    else if(r.libero) nSide = `<div class="extra-item" style="background:#FEFCE8;border-color:#FDE047;color:#854D0E">${esc(r.libero)}</div>`;
    else nSide = dash();
    return `<div class="cmp-card">
      <div class="cmp-head"><span class="em">${r.icon}</span><span>${r.title}</span></div>
      <div class="cmp-cols">
        <div class="cmp-col"><div class="cmp-items">${eSide}</div></div>
        <div class="cmp-col"><div class="cmp-items">${nSide}</div></div>
      </div>
    </div>`;
  }).join('');

  const sel = weekDates().find(x=>x.id===wd);
  return `
    <div class="page-title">${isT?'Oggi':NOEMI_FULL[wd]}</div>
    <div class="page-sub">${sel?fmtFull(sel.obj):NOEMI_FULL[wd]} · ${trainLabel(wd)}</div>
    ${calendarHTML()}
    <div class="cmp-top">
      <div class="cmp-top-col e">🍓 Noemi</div>
      <div class="cmp-top-col n"><span>💪 Nicholas</span><span class="train-tag">${esc(trainLabel(wd))}</span></div>
    </div>
    ${cards}
  `;
}

function splitLabel(label){
  // separa emoji iniziale dal resto
  const parts = label.split(' ');
  // se la prima parte è non-alfanumerica (emoji), separala
  if(parts.length>1 && !/^[a-zA-Z0-9]/.test(parts[0])) return [parts[0], parts.slice(1).join(' ')];
  return ['', label];
}

// ── DRAG-TO-REORDER categorie (reflow live, no re-render) ──
let _catDrag = null;
window.catDragStart = (e, key) => {
  e.preventDefault();
  const handle = e.currentTarget;
  const row  = handle.closest('.catman-row');
  const list = row.parentElement;
  row.classList.add('catman-dragging');
  try{ handle.setPointerCapture(e.pointerId); }catch(_){}
  _catDrag = { row, list, handle };
  // baseline = differenza tra dito e posizione corrente della riga
  _catDrag.startY = e.clientY;
  document.addEventListener('pointermove', catDragMove, {passive:false});
  document.addEventListener('pointerup', catDragEnd);
  document.addEventListener('pointercancel', catDragEnd);
};
function catDragMove(e){
  if(!_catDrag) return;
  e.preventDefault();
  const { row, list } = _catDrag;
  const y = e.clientY;
  // 1) la riga segue il dito
  row.style.transform = `translateY(${y - _catDrag.startY}px) scale(1.02)`;
  // 2) trova dove inserire (primo fratello il cui centro sta sotto il dito)
  const sibs = [...list.querySelectorAll('.catman-row:not(.catman-dragging)')];
  let target = null;
  for(const sib of sibs){
    const r = sib.getBoundingClientRect();
    if(y < r.top + r.height/2){ target = sib; break; }
  }
  // 3) riordina nel DOM correggendo la baseline così resta sotto al dito
  const before = row.offsetTop;
  if(target) list.insertBefore(row, target); else list.appendChild(row);
  const after = row.offsetTop;
  if(after !== before){
    _catDrag.startY += (after - before);
    row.style.transform = `translateY(${y - _catDrag.startY}px) scale(1.02)`;
  }
}
function catDragEnd(){
  if(!_catDrag) return;
  const { row, list } = _catDrag;
  document.removeEventListener('pointermove', catDragMove);
  document.removeEventListener('pointerup', catDragEnd);
  document.removeEventListener('pointercancel', catDragEnd);
  // assestamento dolce: la riga scivola nella sua posizione finale
  row.style.transition = 'transform .2s cubic-bezier(.2,.8,.3,1)';
  row.style.transform = '';
  const keys = [...list.querySelectorAll('.catman-row')].map(r=>r.dataset.key);
  setTimeout(()=>{ row.style.transition=''; row.classList.remove('catman-dragging'); }, 210);
  _catDrag = null;
  saveCatOrder(keys);
}
function saveCatOrder(keys){
  // il DOM è già ordinato: salvo su Firebase SENZA re-render (evita flicker)
  const cats = getSpesaCats();
  const map = {}; cats.forEach(c=>map[c.key]=c);
  keys.forEach((k,i)=>{
    const c = map[k]; if(!c) return;
    try{ set(ref(db,'spesaCategories/'+k), {label:c.label, order:i+1}); }catch(e){}
  });
}

  const newKey = key || 'cat_' + Date.now();
  const SPESA_CATS = getSpesaCats();

function spesaCounts(){
  const SPESA_CATS = getSpesaCats();
  let total=0,done=0;
  SPESA_CATS.forEach(c=>(spesa[c.key]||[]).forEach(i=>{ total++; if(i.d) done++; }));
  return {total,done};
}

function saveSpesaCat(cat){ try{ const l=spesa[cat]; set(ref(db,'spesa/'+cat), (l&&l.length)?l:null); }catch(e){} }
window.addSpesa = (cat)=>{ const el=document.getElementById('spin-'+cat); const v=(el?el.value:'').trim(); if(!v) return; const list=(spesa[cat]||[]).slice(); list.push({t:v,d:false}); spesa[cat]=list; saveSpesaCat(cat); renderContent(); };
window.toggleSpesa = (cat,i)=>{ const list=(spesa[cat]||[]).slice(); if(!list[i])return; list[i]={...list[i],d:!list[i].d}; spesa[cat]=list; saveSpesaCat(cat); renderContent(); };
window.delSpesa = (cat,i)=>{ const list=(spesa[cat]||[]).slice(); list.splice(i,1); spesa[cat]=list; saveSpesaCat(cat); renderContent(); };
window.renameSpesaItem = (cat,i,text)=>{
  const v=(text||'').replace(/\s+/g,' ').trim();
  const list=(spesa[cat]||[]).slice(); if(!list[i]) return;
  if(!v || v===list[i].t) return;            // vuoto o invariato: ignora
  list[i]={...list[i], t:v}; spesa[cat]=list; saveSpesaCat(cat); toast('✓ Rinominato');
};
window.toggleCatAll = (cat)=>{ const list=(spesa[cat]||[]).slice(); if(!list.length)return; const all=list.every(i=>i.d); list.forEach(i=>i.d=!all); spesa[cat]=list; saveSpesaCat(cat); renderContent(); };
window.toggleAllSpesa = ()=>{
  const SPESA_CATS = getSpesaCats();
  const allDone = SPESA_CATS.every(c=>(spesa[c.key]||[]).every(i=>i.d)) && SPESA_CATS.some(c=>(spesa[c.key]||[]).length);
  const newSpesa = {};
  SPESA_CATS.forEach(c=>{ const l=(spesa[c.key]||[]).map(i=>({...i, d:!allDone})); if(l.length) newSpesa[c.key]=l; });
  spesa = newSpesa;
  try{ set(ref(db,'spesa'), Object.keys(newSpesa).length ? newSpesa : null); }catch(e){}
  renderContent();
};

// ── Spesa fatta: i FLAGGATI passano in dispensa; i non spuntati restano "da comprare" ──
window.spesaFatta = ()=>{
  const SPESA_CATS = getSpesaCats();
  const snap = { date: new Date().toLocaleDateString('it-IT'), items:{} };
  const newSpesa = {};
  let moved = 0;
  SPESA_CATS.forEach(c=>{
    const list = spesa[c.key]||[];
    const taken    = list.filter(i=>i.d);
    const leftover = list.filter(i=>!i.d);
    if(taken.length){ snap.items[c.key]=taken; }   // snapshot per consultazione
    // i flaggati → dispensa (verbatim, attivi); i non flaggati restano in lista
    taken.forEach(it=>{
      if(!pantry.some(p=>p.t.toLowerCase()===it.t.toLowerCase())){
        pantry.push({t:it.t, owners:it.owners||[], cat:c.key, active:true});
      }
      moved++;
    });
    if(leftover.length) newSpesa[c.key]=leftover;
  });
  if(!moved) return toast('Spunta gli articoli comprati prima di premere Spesa fatta');
  if(!confirm(`Segnare ${moved} articoli come comprati (vanno in dispensa)?`)) return;
  spesa = newSpesa;
  const ts = Date.now();
  try{
    set(ref(db,'spesaHistory/'+ts), snap);
    set(ref(db,'spesa'), Object.keys(newSpesa).length ? newSpesa : null);
  }catch(e){}
  savePantry();
  renderContent();
  toast(`✓ ${moved} in dispensa`);
};

// ── Svuota dispensa = rimette tutti gli articoli in lista (NON cancella) ──
window.svuotaDispensa = ()=>{
  if(!pantry.length) return toast('La dispensa è già vuota');
  if(!confirm(`Rimettere in lista i ${pantry.length} articoli della dispensa?`)) return;
  const addTo=(cat,t,owners)=>{ const list=(spesa[cat]||[]).slice(); const have=new Set(list.filter(i=>i&&i.t).map(i=>i.t.toLowerCase())); if(have.has((t||'').toLowerCase()))return false; list.push({t,d:false,owners:owners||[]}); spesa[cat]=list; return true; };
  pantry.forEach(p=>addTo(p.cat||'dispensa', p.t, p.owners));
  pantry=[];
  const clean={}; Object.keys(spesa).forEach(k=>{ if((spesa[k]||[]).length) clean[k]=spesa[k]; }); spesa=clean;
  try{ set(ref(db,'spesa'), Object.keys(clean).length?clean:null); set(ref(db,'pantry'), null); }catch(e){}
  renderContent();
  toast('↩️ Articoli rimessi in lista');
};

// ── Recupero d'emergenza: ricostruisce la lista dalla cronologia ──
window.recuperaStorico = ()=>{
  const snaps = Object.values(spesaHistory||{});
  if(!snaps.length) return toast('Nessuna cronologia da cui recuperare');
  if(!confirm('Recuperare tutti gli articoli salvati nella cronologia e rimetterli in lista?')) return;
  let added=0;
  const addTo=(cat,t,owners)=>{ const list=(spesa[cat]||[]).slice(); const have=new Set(list.filter(i=>i&&i.t).map(i=>i.t.toLowerCase())); if(have.has((t||'').toLowerCase()))return false; list.push({t,d:false,owners:owners||[]}); spesa[cat]=list; return true; };
  snaps.forEach(h=>Object.entries(h.items||{}).forEach(([cat,arr])=>(arr||[]).forEach(i=>{ if(i&&i.t && addTo(cat,i.t,i.owners)) added++; })));
  const clean={}; Object.keys(spesa).forEach(k=>{ if((spesa[k]||[]).length) clean[k]=spesa[k]; }); spesa=clean;
  try{ set(ref(db,'spesa'), Object.keys(clean).length?clean:null); }catch(e){}
  renderContent();
  toast(`↩️ ${added} articoli recuperati`);
};

// ── DISPENSA DI CASA (pantry) ──
function savePantry(){ try{ set(ref(db,'pantry'), pantry.length ? pantry : null); }catch(e){} }
window.toPantry = (cat, idx)=>{
  const list = (spesa[cat]||[]).slice();
  const it = list[idx]; if(!it) return;
  list.splice(idx,1); spesa[cat]=list; saveSpesaCat(cat);
  if(!pantry.some(p=>p.t.toLowerCase()===it.t.toLowerCase())) pantry.push({t:it.t, owners:it.owners||[], cat, active:true});
  else pantry = pantry.map(p=> p.t.toLowerCase()===it.t.toLowerCase() ? {...p, active:true, cat} : p);
  savePantry(); renderContent();
  toast('🏠 In dispensa');
};
// rimette in lista una voce della dispensa (torna nella sua categoria)
window.fromPantry = (i)=>{
  const p = pantry[i]; if(!p) return;
  const cat = p.cat || 'dispensa';
  const list = (spesa[cat]||[]).slice();
  if(!list.some(x=>x&&x.t&&x.t.toLowerCase()===p.t.toLowerCase())) list.push({t:p.t, d:false, owners:p.owners||[]});
  spesa[cat]=list; saveSpesaCat(cat);
  pantry.splice(i,1); savePantry(); renderContent();
  toast('Rimesso in lista');
};
// rimuove del tutto dalla dispensa (senza rimetterla in lista)
window.removePantry = (i)=>{ pantry.splice(i,1); savePantry(); renderContent(); };
window.addPantryManual = ()=>{
  const el = document.getElementById('pantry-in'); const v=(el?el.value:'').trim(); if(!v) return;
  if(!pantry.some(p=>p.t.toLowerCase()===v.toLowerCase())) pantry.push({t:v, owners:[], cat:'dispensa', active:true});
  savePantry(); renderContent();
};
window.managerPantry = ()=>{ pantryManager = !pantryManager; renderContent(); };
function renderPantryManager(){
  const rows = pantry.length ? pantry.map((p,i)=>`
    <div class="catman-row">
      <input class="catman-name" value="${esc(p.t)}" onchange="pantryRename(${i},this.value)">
      <button class="catman-del" onclick="pantryDel(${i})" title="Rimuovi">✕</button>
    </div>`).join('') : `<div style="padding:24px;text-align:center;color:#AEB4BE;font-size:14px">Dispensa vuota.<br><span style="font-size:12px">Usa 🏠 su una voce della lista per spostarla qui.</span></div>`;
  return `<div class="cat-editor-overlay show" onclick="managerPantry()"></div>
    <div class="catman-modal" onclick="event.stopPropagation()">
      <div class="catman-head">
        <div class="catman-title">🏠 Dispensa di casa</div>
        <button class="catman-close" onclick="managerPantry()">✕</button>
      </div>
      <div style="font-size:11px;color:#9CA3AF;margin-bottom:12px">Cose che hai già: l'AI non te le riproporrà finché non le togli</div>
      <div class="catman-list">${rows}</div>
      <div class="shop-addrow" style="padding:8px 2px">
        <span class="shop-plus">+</span>
        <input class="shop-in" id="pantry-in" placeholder="aggiungi alla dispensa…" onkeydown="if(event.key==='Enter'){addPantryManual();return false}">
      </div>
    </div>`;
}
window.pantryRename = (i,v)=>{ v=(v||'').trim(); if(!v)return; pantry[i].t=v; savePantry(); toast('✓ Salvato'); };
window.pantryDel = (i)=>{ pantry.splice(i,1); savePantry(); renderContent(); };

// ── Toggle owner su voce ──
window.toggleOwner = (cat, idx, owner) => {
  // articoli in dispensa: toggle owner direttamente sul pantry
  if (cat === '__pantry') {
    const p = pantry[idx]; if(!p) return;
    if(!p.owners) p.owners = [];
    const pos = p.owners.indexOf(owner);
    if(pos>=0) p.owners.splice(pos,1); else p.owners.push(owner);
    savePantry(); renderContent(); return;
  }
  const list = (spesa[cat]||[]).slice();
  if (!list[idx]) return;
  if (!list[idx].owners) list[idx].owners = [];
  const owners = list[idx].owners;
  const pos = owners.indexOf(owner);
  if (pos >= 0) owners.splice(pos, 1);
  else owners.push(owner);
  spesa[cat] = list;
  saveSpesaCat(cat);
  renderContent();
};

// ── ACTIONS ──
window.setTab     = t => { tab=t; editMode=false; editBase=null; closeNav(); updateTabbar(); renderContent(true); window.scrollTo(0,0); };
window.toggleNav  = () => { const r=document.getElementById('rail'); const open=r.classList.toggle('exp'); document.body.classList.toggle('nav-open', open); };
window.closeNav   = () => { document.getElementById('rail').classList.remove('exp'); document.body.classList.remove('nav-open'); };
window.setNicType = id => { nicType=id; renderContent(); };
window.setOggiDay = id => { oggiDay=id; renderContent(); };
window.setNoemiDay= id => { noemiDay=id; renderContent(); };
window.setSchedule= (wd,id) => { schedule[wd]=id; try{ set(ref(db,'schedule/'+wd), id); }catch(e){} renderContent(); };
window.setPlan    = (wd,key,val) => { if(!noemiPlan[wd]) noemiPlan[wd]={}; noemiPlan[wd][key]=val; try{ set(ref(db,'noemiPlan/'+wd+'/'+key), val); }catch(e){} toast('✓ Salvato'); };
window.toggleMealFree = (wd,mk) => { const nv=!isMealFree(wd,mk); if(!noemiPlan[wd]) noemiPlan[wd]={}; noemiPlan[wd][mk+'_free']=nv; try{ set(ref(db,'noemiPlan/'+wd+'/'+mk+'_free'), nv); }catch(e){} renderContent(); };

window.resetNicWeek   = () => { if(!confirm('Azzerare il piano allenamenti della settimana?')) return; schedule={}; try{ set(ref(db,'schedule'), null); }catch(e){} renderContent(); toast('Settimana azzerata'); };
window.resetNoemiWeek = () => { if(!confirm('Azzerare tutte le scelte della settimana di Noemi?')) return; noemiPlan={}; try{ set(ref(db,'noemiPlan'), null); }catch(e){} renderContent(); toast('Settimana azzerata'); };
window.resetNoemiDay  = wd => { if(!confirm('Azzerare le scelte di '+NOEMI_FULL[wd]+'?')) return; if(noemiPlan) delete noemiPlan[wd]; try{ set(ref(db,'noemiPlan/'+wd), null); }catch(e){} renderContent(); toast(NOEMI_FULL[wd]+' azzerato'); };

function updateTabbar(){
  document.querySelectorAll('#rail button[data-tab]').forEach(b=>b.classList.toggle('act', b.dataset.tab===tab));
}

function renderContent(animate){
  const el = document.getElementById('content');
  el.classList.remove('tab-anim');
  el.innerHTML = editBase==='noemi'    ? renderNoemiBaseEdit()
               : editBase==='nicholas' ? renderNicBaseEdit()
               : tab==='oggi'      ? renderOggi()
               : tab==='nicholas'  ? renderNicholasTab()
               : tab==='spesa'     ? renderSpesaTab()
               :                     renderNoemiTab();
  el.classList.remove('saving');
  if(animate){ void el.offsetWidth; el.classList.add('tab-anim'); }
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

oggiDay = todayId(); noemiDay = todayId();
updateTabbar();
renderContent();
</script>
