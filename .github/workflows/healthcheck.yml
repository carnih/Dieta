name: Health check sito Dieta

# Gira nel cloud di GitHub: il PC puo' essere spento.
# Email automatica SOLO se il job fallisce (= problema trovato).
on:
  schedule:
    - cron: '0 5 * * *'      # ~07:00 Europe/Rome in estate (06:00 in inverno)
  workflow_dispatch: {}        # avvio manuale dalla tab "Actions"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Controlla che il sito sia su e sano
        run: |
          python3 - <<'PY'
          import urllib.request, sys
          URL = "https://dieta-livid.vercel.app/"
          problems = []
          try:
              req = urllib.request.Request(URL, headers={'User-Agent': 'dieta-healthcheck'})
              with urllib.request.urlopen(req, timeout=30) as r:
                  code = r.status
                  html = r.read().decode('utf-8', 'ignore')
          except Exception as e:
              print("Sito irraggiungibile:", e)
              sys.exit(1)

          if code != 200:
              problems.append(f"HTTP {code} invece di 200")
          if len(html) < 300:
              problems.append("HTML troppo corto o vuoto")

          # Tollerante alla migrazione: va bene sia il monolite (firebasejs inline) sia
          # la nuova app React (Vite monta su <div id="root"> + bundle in /assets/).
          monolite = "firebasejs" in html
          react = ('id="root"' in html) and ("/assets/" in html)
          if not (monolite or react):
              problems.append("la pagina non sembra ne' il monolite ne' l'app React (markup inatteso)")

          if problems:
              print("PROBLEMI sul sito Dieta:")
              for p in problems:
                  print("  -", p)
              sys.exit(1)   # fallisce -> GitHub invia email

          print("OK · variante:", "react" if react else "monolite")
          PY
