name: Sync allenamenti (intervals.icu -> Firebase)

# Legge le attività da intervals.icu (sincronizzate da Garmin) e le scrive su Firebase.
# Gira nel cloud di GitHub ogni mattina; il PC può essere spento.
on:
  schedule:
    # Sera: a fine giornata tutte le attivita' del giorno sono gia' su intervals.icu.
    # NB: gli eventi 'schedule' al minuto 00 (picco GitHub) vengono spesso ritardati/saltati
    # -> minuto dispari. Due run a un'ora di distanza: il sync e' idempotente, quindi
    # fanno da riserva l'uno all'altro se GitHub ne salta/ritarda uno.
    - cron: '17 17 * * *'    # ~19:17 Europe/Rome (estate) / 18:17 (inverno)
    - cron: '17 18 * * *'    # riserva: ~20:17 / 19:17
  workflow_dispatch:           # avvio manuale dalla tab "Actions"
    inputs:
      force_tracks:
        description: "Rigenera TUTTE le tracce GPS (lento, ~92) - usare dopo modifiche al calcolo salite"
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sincronizza intervals.icu -> Firebase
        env:
          INTERVALS_ATHLETE: ${{ secrets.INTERVALS_ATHLETE }}
          INTERVALS_KEY:     ${{ secrets.INTERVALS_KEY }}
          FB_EMAIL:          ${{ secrets.FB_EMAIL }}
          FB_PASSWORD:       ${{ secrets.FB_PASSWORD }}
          FORCE_TRACKS:      ${{ inputs.force_tracks }}
        run: python3 .github/scripts/sync_intervals.py
